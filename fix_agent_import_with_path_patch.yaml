task: Fix 'agent is not a package' by ensuring path visibility and module validity
goals:
  - Ensure 'agent/' is treated as a package
  - Add the project root to sys.path if needed
  - Confirm that 'AutonomousAgent' can be imported cleanly

steps:
  - description: Add current project root to sys.path
    run: |
      import sys, os
      root_dir = os.path.abspath(os.path.dirname(__file__) + "/..")
      if root_dir not in sys.path:
          sys.path.insert(0, root_dir)
      print(f"✅ Root path added to sys.path: {root_dir}")

  - description: Create 'agent/__init__.py' to mark it as a package
    run: |
      init_path = os.path.join("agent", "__init__.py")
      if not os.path.exists(init_path):
          os.makedirs("agent", exist_ok=True)
          with open(init_path, "w") as f:
              f.write("# Init for agent package\n")
          print("✅ Created agent/__init__.py")

  - description: Ensure 'autonomous_agent.py' exists with a stub class
    run: |
      agent_file = os.path.join("agent", "autonomous_agent.py")
      if not os.path.exists(agent_file):
          with open(agent_file, "w") as f:
              f.write("class AutonomousAgent:\n    def __init__(self):\n        print('✅ AutonomousAgent initialized')\n")
          print("✅ Created autonomous_agent.py with stub class")
      else:
          content = open(agent_file).read()
          if "class AutonomousAgent" not in content:
              with open(agent_file, "w") as f:
                  f.write("class AutonomousAgent:\n    def __init__(self):\n        print('✅ AutonomousAgent initialized')\n")
              print("✅ Overwrote autonomous_agent.py with correct class")

  - description: Confirm successful import of AutonomousAgent
    run: |
      try:
          from agent.autonomous_agent import AutonomousAgent
          agent = AutonomousAgent()
          print("✅ Import successful.")
      except Exception as e:
          raise ImportError(f"❌ Import still failed: {e}")

