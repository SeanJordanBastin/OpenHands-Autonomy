# ✅ File: tasks/start_full_stack_agent_controlled.yaml

name: start_full_stack_agent_controlled

steps:
  - name: Ensure required folders exist
    run: |
      mkdir -p scripts
      mkdir -p tasks

  - name: Fix broken YAML files
    run: |
      python scripts/yaml_sanitizer.py --path tasks/

  - name: Write Docker Compose file
    run: |
      cat > docker-compose.yml <<EOF
      version: "3.9"
      services:
        backend:
          build: ./backend
          ports:
            - "3001:3001"
          volumes:
            - ./backend:/app
          command: poetry run python main.py

        frontend:
          build: ./frontend
          ports:
            - "5173:5173"
          volumes:
            - ./frontend:/app
          command: npm run dev

        agent:
          build: ./openhands
          volumes:
            - ./openhands:/app
          command: poetry run python scripts/agent.py --task-file tasks/start_full_stack_agent_controlled.yaml
      EOF

  - name: Write backend Dockerfile
    run: |
      cat > backend/Dockerfile <<EOF
      FROM python:3.10
      WORKDIR /app
      COPY . .
      RUN pip install poetry && poetry install
      CMD ["poetry", "run", "python", "main.py"]
      EOF

  - name: Write frontend Dockerfile
    run: |
      cat > frontend/Dockerfile <<EOF
      FROM node:18
      WORKDIR /app
      COPY . .
      RUN npm install
      CMD ["npm", "run", "dev"]
      EOF

  - name: Write agent Dockerfile
    run: |
      cat > openhands/Dockerfile <<EOF
      FROM python:3.10
      WORKDIR /app
      COPY . .
      RUN pip install poetry && poetry install
      CMD ["poetry", "run", "python", "scripts/agent.py", "--task-file", "tasks/start_full_stack_agent_controlled.yaml"]
      EOF

  - name: Write startup shell script
    run: |
      cat > scripts/start_all.sh <<EOF
      #!/bin/bash
      echo "🚀 Starting Docker Compose full stack..."

      docker-compose down
      docker-compose build
      docker-compose up -d

      echo "✅ All containers launched. Monitoring logs..."
      docker-compose logs -f
      EOF
      chmod +x scripts/start_all.sh

  - name: Start Docker Compose stack
    run: |
      ./scripts/start_all.sh || echo "Startup failed. Retrying..."

  - name: Monitor frontend and backend startup
    run: |
      curl --fail http://localhost:3001 || echo "❌ Backend not ready"
      curl --fail http://localhost:5173 || echo "❌ Frontend not ready"

  - name: Retry if failures detected
    run: |
      if ! curl --fail http://localhost:3001 || ! curl --fail http://localhost:5173; then
        echo "🔁 Retrying full startup..."
        ./scripts/start_all.sh
      fi

  - name: Confirm agent loop is alive
    run: |
      ps aux | grep agent.py | grep -v grep || echo "❌ Agent not running"

