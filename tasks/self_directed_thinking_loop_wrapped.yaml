task:
  name: self_directed_thinking_loop
  steps:
  - run:
      description: The agent autonomously thinks about what it should do next to improve
        the platform, without being told by a user.
      steps:
      - inputs:
          messages:
          - content: "You are a self-directed software agent improving the ProcureIQ\
              \ platform.\nYou are capable of observing what exists, what\u2019s broken,\
              \ and what\u2019s missing.\nYour goal is to continuously plan new improvements\
              \ and queue them as task files.\n"
            role: system
          - content: "Here is your current knowledge:\n- The agent has working CRUD,\
              \ UI building, model migration, and YAML self-healing.\n- Many YAMLs\
              \ fail due to format or structure.\n- Some tasks need rewriting or splitting\
              \ up.\n- The agent must eventually be able to fully build ProcureIQ\
              \ alone.\n\nThink carefully:\n1. What should you work on next?\n2. What\
              \ task would move the platform forward or improve agent intelligence?\n\
              3. What are 2\u20133 actionable YAML tasks you can create and queue\
              \ now?\n"
            role: user
          model: gpt-4o
        name: Reflect on current project state
        uses: chatgpt
      - name: Parse GPT task suggestions
        run: 'import re

          context["task_blocks"] = re.findall(r"```yaml(.*?)```", chatgpt.output,
          re.DOTALL)

          '
        uses: python
      - name: Save new task files
        run: "import os\nos.makedirs(\"tasks/generated\", exist_ok=True)\nfor i, block\
          \ in enumerate(context.get(\"task_blocks\", [])):\n    with open(f\"tasks/generated/self_directed_{i}.yaml\"\
          , \"w\") as f:\n        f.write(block.strip())\n"
        uses: python
      - name: Log plan
        run: "with open(\"logs/self_directed_plan_log.txt\", \"a\") as log:\n    log.write(\"\
          \\\\n\\\\n--- New Plan ---\\\\n\" + chatgpt.output + \"\\\\n\")\n"
        uses: python
      - name: Loop and repeat
        run: 'echo "Sleeping for 30 seconds before next self-reflection..."

          sleep 30

          poetry run python scripts/agent.py --task-file tasks/self_directed_thinking_loop.yaml

          '
        uses: shell
      task: run_self_directed_thinking_loop
