task: Finalize JARVIS Identity and Configuration
description: |
  Now that JARVIS is renamed and functional, finalize her self-identity, startup message,
  internal module integrity, and metadata file. Confirm package structure and prepare for Git.

steps:
  - description: Add friendly startup log message
    update_file:
      path: jarvis/autonomous_agent.py
      insert_after: "class Jarvis:"
      code: |
        def __init__(self):
            print("🧠 Hello, I'm JARVIS. Ready to optimize your code.")

  - description: Add __init__.py if missing
    if_not_exists: jarvis/__init__.py
    create_file:
      path: jarvis/__init__.py
      content: "# Makes 'jarvis' a Python package\n"

  - description: Add jarvis/identity.json file
    create_file:
      path: jarvis/identity.json
      content: |
        {
          "name": "JARVIS",
          "version": "1.0",
          "personality": "Helpful, adaptive, autonomous AI agent",
          "created": "2025-07-21",
          "origin": "OpenHands Main"
        }

  - description: Check for broken imports or modules
    shell: |
      echo "🔍 Validating all jarvis imports..."
      find . -name "*.py" -exec grep -H "from jarvis" {} \;
      python -m py_compile jarvis/*.py || echo "⚠️ Compilation issue detected"

  - description: Print completion message
    shell: echo "✅ JARVIS finalization complete. All systems go."

  - description: Optional Git commit (only if .git exists)
    if_exists: .git
    shell: |
      echo "📦 Committing final JARVIS changes to Git..."
      git add jarvis/
      git commit -m "Finalize JARVIS identity and package structure"

