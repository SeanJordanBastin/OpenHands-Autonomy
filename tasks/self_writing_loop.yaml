task: "Self-Writing Error Recovery Loop"

steps:
  - name: Run Python Self-Healing Script
    run: |
      import os
      import subprocess
      import openai
      from datetime import datetime

      openai.api_key = os.getenv("OPENAI_API_KEY")
      BACKUP_DIR = "fixed_backups"
      os.makedirs(BACKUP_DIR, exist_ok=True)

      def ask_gpt_for_fix(filename, error):
          with open(filename, "r") as f:
              broken_code = f.read()

          prompt = (
              "You are an AI repair agent.\n"
              f"The following file encountered an error while executing: {filename}\n\n"
              f"Error:\n{error}\n\n"
              "Here is the broken code:\n"
              "```python\n"
              f"{broken_code}\n"
              "```"
          )

          response = openai.ChatCompletion.create(
              model="gpt-4",
              messages=[{"role": "user", "content": prompt}],
              temperature=0
          )
          return response["choices"][0]["message"]["content"].strip()

      def backup_and_replace(filename, new_content):
          timestamp = datetime.now().strftime("%Y%m%d_%H%M%S")
          backup_path = os.path.join(BACKUP_DIR, f"{os.path.basename(filename)}.{timestamp}")
          with open(filename, "r") as f:
              original = f.read()
          with open(backup_path, "w") as f:
              f.write(original)
          with open(filename, "w") as f:
              f.write(new_content)
          print(f"🧠 Backup saved → {backup_path}")
          print(f"✅ File updated → {filename}")

      def run_task():
          try:
              subprocess.run(["poetry", "run", "python", "scripts/agent.py"], check=True)
              return True
          except subprocess.CalledProcessError as e:
              print("🔥 Agent crashed. Asking GPT to fix it...")
              error_msg = str(e)
              if "File" in error_msg and ".py" in error_msg:
                  lines = error_msg.split("\n")
                  for line in lines:
                      if "File" in line and ".py" in line:
                          parts = line.strip().split("\"")
                          if len(parts) >= 2:
                              broken_file = parts[1]
                              print(f"🍀 File to fix: {broken_file}")
                              fixed_code = ask_gpt_for_fix(broken_file, error_msg)
                              backup_and_replace(broken_file, fixed_code)
                              return False
              return False

      max_attempts = 3
      for attempt in range(1, max_attempts + 1):
          print(f"💫 Attempt {attempt}")
          if run_task():
              print("✅ Task completed successfully.")
              break
      else:
          print("❌ Max retries reached. Manual intervention required.")

